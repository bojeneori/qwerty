<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Товары</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- ВСТАВКА HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container">

    <!-- SIDEBAR (ФИЛЬТРЫ) -->
    <aside class="filters">

        <h3>Поиск</h3>
        <form method="get" action="/products">
            <input type="text" name="search" placeholder="Поиск..." />
            <button type="submit">Найти</button>
        </form>

        <h3>Фильтры</h3>

        <form method="get" action="/products">

            <div th:each="category : ${categories}">
                <p><b th:text="${category.name}">Категория</b></p>

                <div th:each="option : ${category.options}">
                    <label>
                        <input type="checkbox"
                               name="filters"
                               th:value="${option.id}" />
                        <span th:text="${option.value}">Опция</span>
                    </label>
                </div>

                <hr>
            </div>

            <button type="submit">Применить</button>
        </form>

    </aside>

    <!-- PRODUCTS -->
    <main class="products">

        <div th:each="product : ${products}"
             class="product-card"
             th:classappend="${product.quantityInStock == 0 ? ' out-of-stock' : ''}">

            <!-- ВСЯ КАРТОЧКА ВНУТРИ -->

            <a th:href="@{/product/{id}(id=${product.id})}"
               class="product-link">
                <img th:src="@{'/images/' + ${product.mainImageUrl}}" />
            </a>

            <h3 th:text="${product.name}"></h3>

            <p th:text="${product.price} + ' ₽'"></p>

            <p>Осталось: <span th:text="${product.quantityInStock}"></span></p>

            <div class="out-stock-badge"
                 th:if="${product.quantityInStock == 0}">
                Нет в наличии
            </div>

            <div class="actions">
                <th:block th:if="${product.quantityInStock > 0}">
                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                        <button type="submit">В корзину</button>
                    </form>
                    <form th:action="@{/reservation/{id}(id=${product.id})}" method="post">
                        <button type="submit">Забронировать</button>
                    </form>
                </th:block>

                <th:block th:unless="${product.quantityInStock > 0}">
                    <button type="button" disabled class="disabled-btn">Нет в наличии</button>
                    <button type="button" disabled class="disabled-btn">Недоступно</button>
                </th:block>
            </div>

        </div>

    </main>

</div>

<!-- ВСТАВКА FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
