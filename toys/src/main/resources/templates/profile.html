<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Профиль</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container profile-container">

    <!-- Профиль -->
    <div class="card">
        <div class="card-header">
            Профиль
        </div>

        <div class="card-body">
            <p><strong>Имя:</strong> <span th:text="${user.fullName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
            <p><strong>Адрес:</strong> <span th:text="${user.defaultAddress ?: 'Не указан'}"></span></p>
            <p><strong>Город:</strong> <span th:text="${user.defaultCity ?: 'Не указан'}"></span></p>
            <p><strong>Индекс:</strong> <span th:text="${user.defaultPostalCode ?: 'Не указан'}"></span></p>
            <form th:action="@{/profile/edit}" method="get" style="margin-top: 15px;">
                <button type="submit" class="btn btn-danger">
                    Редактировать профиль
                </button>
            </form>
        </div>
    </div>

    <!-- Активные бронирования -->
    <div class="card">
        <div class="card-header">Активные бронирования</div>
        <div class="card-body">

            <div th:if="${reservations != null and !reservations.isEmpty()}">
                <div th:each="r : ${reservations}" class="reservation-item">

                    <p>
                        <strong th:text="${r.product.name}">Название товара</strong>
                    </p>

                    <p>
                        Действует до:
                        <span th:text="${#temporals.format(r.expiresAt, 'dd.MM.yyyy HH:mm')}"></span>
                    </p>

                    <span class="badge badge-success">Зарезервировано</span>

                    <form th:action="@{/profile/reservations/{id}/cancel(id=${r.id})}"
                          method="post"
                          style="margin-top: 15px;">

                        <button type="submit"
                                class="btn btn-danger"
                                th:attr="data-reservation-id=${r.id}"
                                onclick="return confirmReservationCancel(this)">
                            Отменить бронирование
                        </button>
                    </form>

                    <hr/>
                </div>
            </div>

            <div th:if="${reservations == null or reservations.isEmpty()}">
                Нет активных бронирований
            </div>

        </div>
    </div>

    <!-- Корзина -->
    <div class="card">
        <div class="card-header">Корзина</div>
        <div class="card-body">

            <div th:if="${cart != null and cart.items != null and !cart.items.isEmpty()}">

                <div th:each="item : ${cart.items}"
                     class="cart-item"
                     th:attr="data-cart-reservation-id=${item.reservationId}">

                    <p>
                        <strong th:text="${item.product.name}"></strong>
                    </p>

                    <span th:if="${item.reservationId != null}"
                          style="color: green;">
                        Зарезервирован
                    </span>

                    <hr/>
                </div>

                <div style="text-align: right;">
                    <a href="/cart" class="btn btn-primary">
                        Открыть корзину
                    </a>
                </div>

                <p style="font-size: 0.9em; color: gray; text-align: right;">
                    Действительна до:
                    <span th:text="${#temporals.format(cart.expiresAt, 'dd.MM.yyyy HH:mm')}"></span>
                </p>

            </div>

            <div th:if="${cart == null or cart.items == null or cart.items.isEmpty()}">
                Корзина пуста
            </div>

        </div>
    </div>

    <!-- История заказов -->
    <div class="card">
        <div class="card-header">История заказов</div>
        <div class="card-body">

            <div th:if="${orders != null and !orders.isEmpty()}">

                <div th:each="order : ${orders}" class="order-item">

                    <p>
                        <strong>Заказ от:</strong>
                        <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy')}"></span>
                    </p>

                    <p>
                        Сумма:
                        <strong th:text="${order.price + ' ₽'}"></strong>
                    </p>

                    <hr/>
                </div>

            </div>

            <div th:if="${orders == null or orders.isEmpty()}">
                У вас пока нет заказов
            </div>

        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    function confirmReservationCancel(button) {
        const reservationId = button.getAttribute('data-reservation-id');

        const cartItems = document.querySelectorAll('[data-cart-reservation-id]');
        let inCart = false;

        cartItems.forEach(item => {
            if (item.getAttribute('data-cart-reservation-id') === reservationId) {
                inCart = true;
            }
        });

        if (inCart) {
            return confirm(
                'Вы уверены? Это удалит товар из вашей корзины.'
            );
        }

        return confirm(
            'Вы уверены, что хотите отменить бронирование?'
        );
    }
</script>

</body>
</html>
