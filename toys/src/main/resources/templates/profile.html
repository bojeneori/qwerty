<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Профиль</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- ВСТАВКА HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container profile-container">

    <div class="card">
        <div class="card-header">Профиль</div>
        <div class="card-body">
            <p><strong>Имя:</strong> <span th:text="${user.fullName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
            <p><strong>Адрес:</strong>
                <span th:text="${user.defaultAddress ?: 'Не указан'}"></span>
            </p>
            <p><strong>Город:</strong>
                <span th:text="${user.defaultCity ?: 'Не указан'}"></span>
            </p>
            <p><strong>Индекс:</strong>
                <span th:text="${user.defaultPostalCode ?: 'Не указан'}"></span>
            </p>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Активные бронирования</div>
        <div class="card-body">

            <div th:if="${reservations != null and !reservations.isEmpty()}">
                <div th:each="r : ${reservations}" class="reservation-item">

                    <p>
                        <strong th:text="${r.product.name}">Название товара</strong>
                    </p>

                    <p>
                        Действует до:
                        <span th:text="${#temporals.format(r.expiresAt, 'dd.MM.yyyy HH:mm')}"></span>
                    </p>

                    <span class="badge badge-success">Зарезервировано</span>

                    <hr/>
                </div>
            </div>

            <div th:if="${reservations == null or reservations.isEmpty()}">
                Нет активных бронирований
            </div>

        </div>
    </div>


    <div class="card">
        <div class="card-header">Корзина</div>
        <div class="card-body">

            <div th:if="${cart != null and cart.items != null and !cart.items.isEmpty()}">

                <div th:each="item : ${cart.items}" class="cart-item">
                    <p><strong th:text="${item.product.name}"></strong></p>

                    <span th:if="${item.reservationId != null}"
                          style="color: green;">
                        Зарезервирован
                    </span>

                    <hr/>
                </div>

                <div style="text-align: right;">
                    <a href="/cart" class="btn btn-primary">Открыть корзину</a>
                </div>

                <p style="font-size: 0.9em; color: gray; text-align: right;">
                    Действительна до:
                    <span th:text="${#temporals.format(cart.expiresAt, 'dd.MM.yyyy HH:mm')}"></span>
                </p>

            </div>

            <div th:if="${cart == null or cart.items == null or cart.items.isEmpty()}">
                Корзина пуста
            </div>

        </div>
    </div>


    <div class="card">
        <div class="card-header">История заказов</div>
        <div class="card-body">

            <div th:if="${orders != null and !orders.isEmpty()}">

                <div th:each="order : ${orders}" class="order-item">

                    <p>
                        <strong>Заказ от:</strong>
                        <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy')}"></span>
                    </p>

                    <p>
                        Сумма:
                        <strong th:text="${order.price + ' ₽'}"></strong>
                    </p>

                    <hr/>
                </div>

            </div>

            <div th:if="${orders == null or orders.isEmpty()}">
                У вас пока нет заказов
            </div>

        </div>
    </div>

</div>

<!-- ВСТАВКА FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
