<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Заказы</title>
</head>
<body>

<h1>Мои заказы</h1>

<a href="/products">К товарам</a>

<hr>

<div th:each="order : ${orders}">
    <p>
        Заказ №<span th:text="${order.id}">1</span><br>
        Дата: <span th:text="${order.createdAt}">date</span>
    </p>

    <div th:each="item : ${order.items}">
        - <span th:text="${item.product.name}">Товар</span>
        (x<span th:text="${item.quantity}">1</span>)
    </div>

    <hr>
</div>

</body>
</html>
